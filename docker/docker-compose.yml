version: '3.8'

services:
  landing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.landing
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - bandanaiera-network

  backoffice:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backoffice
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - bandanaiera-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - landing
      - backoffice
    restart: unless-stopped
    networks:
      - bandanaiera-network

networks:
  bandanaiera-network:
    driver: bridge
