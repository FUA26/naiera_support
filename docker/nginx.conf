events {
    worker_connections 1024;
}

http {
    upstream landing {
        server landing:3000;
    }

    upstream backoffice {
        server backoffice:3001;
    }

    # Landing app - accessible via root domain or landing subdomain
    server {
        listen 80;
        server_name bandanaiera.local landing.bandanaiera.local;

        location / {
            proxy_pass http://landing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Backoffice app - accessible via admin subdomain
    server {
        listen 80;
        server_name admin.bandanaiera.local;

        location / {
            proxy_pass http://backoffice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
